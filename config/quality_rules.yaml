enabled: true

block_on:
  development: true
  live_scoring: true
  compare: false

native:
  min_rows_warn: 200
  min_rows_fail: 1
  min_unique_customers_warn: 50
  min_unique_customers_fail: 1
  min_avg_coverage_warn: 0.85
  min_avg_coverage_fail: 0.65
  min_feature_coverage_warn: 0.65
  min_feature_coverage_fail: 0.30
  outlier_z_threshold: 5.0
  max_outlier_share_warn: 0.02
  max_outlier_share_fail: 0.08
  duplicate_keys:
    fail_on_any: true
  freshness:
    enabled: true
    date_columns:
      - fs_last_update_date
    max_age_days_warn: 120
    max_age_days_fail: 220
    max_stale_share_warn: 0.15
    max_stale_share_fail: 0.35
    # Future-dated FS entries (fs_last_update_date > snapshot_date) are normal when
    # financial statements are filed after the snapshot. Leave thresholds null to disable
    # the future-date gate; set a share (0-1) to escalate when too many rows appear future-dated.
    max_future_share_warn: null
    max_future_share_fail: null

derived:
  min_rows_warn: 200
  min_rows_fail: 1
  min_unique_customers_warn: 50
  min_unique_customers_fail: 1
  min_avg_coverage_warn: 0.90
  min_avg_coverage_fail: 0.70
  min_feature_coverage_warn: 0.70
  min_feature_coverage_fail: 0.35
  outlier_z_threshold: 6.0
  max_outlier_share_warn: 0.03
  max_outlier_share_fail: 0.10
  duplicate_keys:
    fail_on_any: true
