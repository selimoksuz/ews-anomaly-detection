enabled: true
drop_zero_variance_continuous: true
drop_exact_duplicates: true

drop_low_coverage:
  enabled: true
  min_coverage: 0.60

drop_high_correlation:
  enabled: true
  threshold: 0.97
  priority_order:
    - base
    - delta_1
    - self_zscore_6
    - trend_slope_6
    - population_percentile
    - vs_population_median_delta

branch_routing:
  enabled: true
  autoencoder:
    exclude_raw_types: []
    exclude_transforms: []
  isolation_forest:
    exclude_raw_types: []
    exclude_transforms: []
  mahalanobis:
    exclude_raw_types:
      - binary
    exclude_transforms: []
