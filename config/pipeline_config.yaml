config_refs:
  features: feature_registry.yaml
  models: model_params.yaml
  feature_selection: feature_selection_rules.yaml
  preprocessing: preprocessing_rules.yaml
  materialization: materialization_rules.yaml

pipeline:
  name: ews_anomaly_detection
  version: 1.0.0
  id_column: customer_id
  time_column: snapshot_date
  split_column: split_flag
  non_feature_columns:
    - created_at
    - data_time

ensemble:
  weights:
    ae: 0.45
    if: 0.35
    md: 0.2

alert_bands:
  normal:
    min_score: 0
    max_score: 60
  sari:
    min_score: 60
    max_score: 75
  turuncu:
    min_score: 75
    max_score: 90
  kirmizi:
    min_score: 90
    max_score: 100

scoring:
  score_min: 0
  score_max: 100
  top_n_reasons: 3
  persist_full_feature_effects: true
  full_effect_scope: all

training:
  random_seed: 42

stability:
  report_path: runtime/legacy_models/ews_model_stability.json

sources:
  native_features:
    backend: oracle
    oracle:
      table: native_features
  input_features:
    backend: oracle
    oracle:
      table: input_features
  outcomes:
    backend: oracle
    oracle:
      table: outcomes
  outputs:
    backend: oracle
    oracle:
      results_table_key: results
      details_table_key: details
      full_effects_table_key: full_effects

development:
  source_name: input_features
  frequency: monthly
  segment_column: segment
  segment_value: TICARI_ORTA_FAZ1
  sampling:
    enabled: false
    windows:
      - train
    activate_if_rows_gt: 1000000
    max_rows: null
    compare_max_rows: null
    tail_z_threshold: 3.5
    random_seed: 42
    validation:
      max_snapshot_share_delta: 0.02
      max_tail_share_delta: 0.02
      max_missing_share_delta: 0.02
      max_feature_missing_delta: 0.01
      max_feature_ks: 0.1
      fallback_to_full_on_fail: true
  windows:
    mode: relative_periods
    relative:
      anchor_date: null
      calibration_periods: 4
      oot_periods: 4
      test_size: 0.25
      split_seed: 42
    fixed:
      train:
        start: null
        end: null
      test:
        start: null
        end: null
      calibration:
        start: null
        end: null
      oot:
        start: null
        end: null

retraining:
  source_name: development
  auto_promote: false
  promotion_metric: weighting.validation_metrics.primary.precision_at_top_percent
  candidate_name_prefix: challenger

calibration:
  enabled: true
  method: empirical_cdf
  source_window: calibration
  min_rows: 100
  quantiles: 101

weight_optimization:
  enabled: true
  source_name: outcomes
  target_column: label_30dpd_8w
  monitoring_columns:
    - label_default_12m
  training_window: test
  validation_window: oot
  evaluation_windows:
    - test
    - oot
  grid_step: 0.1
  min_component_weight: 0.1
  min_positive_rows: 10
  objective: precision_at_top_percent
  top_percent: 0.1
  selection_tolerance: 0.02
  prefer_balanced_within_tolerance: true
  auto_apply: true

monitoring:
  enabled: true
  directory: runtime/monitoring

live_scoring:
  source_name: input_features
  snapshot:
    selector: today
    explicit_date: null
    start_date: null
    end_date: null

shadow_scoring:
  enabled: false
  mode: raw_shadow
  use_shared_missing_policy: true
  use_shared_hard_bounds: true
  winsorization_enabled: false
  log1p_enabled: false
  scaler_type: standard

batch_execution:
  bootstrap_if_missing_champion: true
  bootstrap_promote: true
  score_live_enabled: true
  refresh_candidate_enabled: true
  candidate_run_type: retrain
  tune_weights_enabled: true
  evaluate_outcomes_enabled: true
  compare_enabled: false
  promote_if_recommended: false
  cleanup_after_run: false

registry:
  registry_dir: runtime/registry
  models_dir: runtime/models
  logs_dir: runtime/logs
  run_registry_file: runtime/registry/run_registry.json
  model_registry_file: runtime/registry/model_registry.json
  champion_registry_file: runtime/registry/champions.json
  registry_lock_file: runtime/registry/.registry.lock

retention:
  logs_days: 14
  run_manifests_days: 30
  models_days: 60
  keep_last_models_per_segment: 5

orchestration:
  airflow:
    dag_id: ews_anomaly_detection
    schedule: 0 8 1 * *
    max_active_runs: 1

oracle:
  schema: ZT_VAR2
  tables:
    native_features: EWS_TO_FAZ1_NATIVE
    input_features: EWS_TO_FAZ1_INPUT
    training: EWS_TO_FAZ1_TRAINING
    scoring: EWS_TO_FAZ1_SCORING
    outcomes: EWS_TO_FAZ1_OUTCOMES
    results: EWS_TO_FAZ1_RESULTS
    details: EWS_TO_FAZ1_DETAILS
    full_effects: EWS_TO_FAZ1_FEATURE_EFFECTS

logging:
  logger_name: ews.pipeline
  level: INFO
  directory: runtime/logs
  file_name: pipeline.log
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  console: true
