pipeline:
  name: anomaly_multivar_detection
  version: 2.0.0
  id_column: mono_id
  time_column: cohort_dt
  non_feature_columns:
    - financial_term_l1y
    - bilanco_flg
    - financial_term_q
    - annualization_q
    - ref_donem_id
    - kkbguncelsorgu_no
    - yukleme_zmn

sources:
  multivar_input:
    backend: oracle
    oracle:
      table: multivar_input

multivar_anomaly:
  source_name: multivar_input
  time_column: cohort_dt
  id_column: mono_id
  default_train_rows: null
  outputs:
    backend: oracle
    oracle:
      results_table_key: multivar_results
      details_table_key: multivar_details

oracle:
  schema: ZT_VAR2
  tables:
    multivar_input: EWS_ANOMALY_MULTIVAR_INPUT
    multivar_results: EWS_ANOMALY_MULTIVAR_RESULTS
    multivar_details: EWS_ANOMALY_MULTIVAR_DETAILS
    llm_results: EWS_ANOMALY_LLM_RESULTS
    llm_reason_details: EWS_ANOMALY_LLM_REASONS

logging:
  logger_name: ews.multivar
  level: INFO
  directory: runtime/logs/cli
  file_name: multivar.log
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  console: true
