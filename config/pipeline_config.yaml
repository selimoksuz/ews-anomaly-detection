pipeline:
  name: ews_anomaly_detection
  version: 1.0.0
  id_column: customer_id
  time_column: snapshot_date
  split_column: split_flag

features:
  instant:
    - name: dpd_current
      label_tr: "Mevcut Gecikme Günü"
    - name: utilization_ratio
      label_tr: "Limit Kullanım Oranı"
    - name: outstanding_balance
      label_tr: "Açık Bakiye Tutarı"
    - name: checking_balance
      label_tr: "Vadesiz Hesap Bakiyesi"
    - name: txn_count_weekly
      label_tr: "Haftalık İşlem Adedi"
    - name: txn_amount_weekly
      label_tr: "Haftalık İşlem Tutarı"
    - name: avg_txn_amount_weekly
      label_tr: "Ortalama Haftalık İşlem Tutarı"
    - name: payment_amount_this_week
      label_tr: "Bu Hafta Yapılan Ödeme Tutarı"
  rolling_4w:
    - name: dpd_max_4w
      label_tr: "Son 4 Haftadaki Maksimum Gecikme"
    - name: min_payment_only_count_4w
      label_tr: "Son 4 Haftada Sadece Minimum Ödeme Sayısı"
    - name: payment_to_min_ratio_4w
      label_tr: "Son 4 Haftada Ödeme / Minimum Ödeme Oranı"
    - name: avg_days_to_payment_4w
      label_tr: "Son 4 Haftada Ortalama Ödeme Günü"
    - name: payment_reversal_count_4w
      label_tr: "Son 4 Haftada Ödeme İptal / İade Sayısı"
    - name: nsf_count_4w
      label_tr: "Son 4 Haftada Karşılıksız İşlem Sayısı"
    - name: overlimit_count_4w
      label_tr: "Son 4 Haftada Limit Aşım Sayısı"
    - name: cash_advance_ratio_4w
      label_tr: "Son 4 Haftada Nakit Avans Oranı"
    - name: checking_balance_min_4w
      label_tr: "Son 4 Haftadaki Minimum Vadesiz Bakiye"
    - name: deposit_amount_avg_4w
      label_tr: "Son 4 Haftadaki Ortalama Mevduat Girişi"
    - name: channel_count_4w
      label_tr: "Son 4 Haftada Kullanılan Kanal Sayısı"
  trend:
    - name: util_slope_4w
      label_tr: "Kullanım Oranı Eğimi (4 Hafta)"
    - name: balance_slope_4w
      label_tr: "Bakiye Eğimi (4 Hafta)"
    - name: checking_slope_4w
      label_tr: "Vadesiz Bakiye Eğimi (4 Hafta)"
    - name: payment_ratio_slope_4w
      label_tr: "Ödeme Oranı Eğimi (4 Hafta)"
    - name: txn_count_change_pct
      label_tr: "İşlem Adedi Değişim Yüzdesi"
    - name: txn_amount_change_pct
      label_tr: "İşlem Tutarı Değişim Yüzdesi"
    - name: deposit_change_pct
      label_tr: "Mevduat Değişim Yüzdesi"
    - name: util_acceleration
      label_tr: "Kullanım İvmesi"
    - name: dpd_direction_4w
      label_tr: "Gecikme Yönü (4 Hafta)"

models:
  autoencoder:
    hidden_layers: [24, 12]
    latent_dim: 6
    epochs: 150
    learning_rate: 0.001
    batch_size: 256
    dropout: 0.0
    reconstruction_loss: mse
  isolation_forest:
    n_estimators: 200
    contamination: 0.05
    max_samples: auto
    random_state: 42
  mahalanobis:
    covariance_estimator: ledoit_wolf
    shrinkage: ledoit_wolf
    score_percentile_cap: 99.5

ensemble:
  weights:
    ae: 0.5
    if: 0.3
    md: 0.2

alert_bands:
  normal:
    min_score: 0
    max_score: 60
  sari:
    min_score: 60
    max_score: 75
  turuncu:
    min_score: 75
    max_score: 90
  kirmizi:
    min_score: 90
    max_score: 100

scoring:
  score_min: 0
  score_max: 100
  top_n_reasons: 3

oracle:
  schema: ZT_VAR2
  tables:
    training: EWS_TRAINING_DATA
    scoring: EWS_SCORING_DATA
    results: EWS_ALERT_RESULTS
    details: EWS_ALERT_DETAILS

logging:
  logger_name: ews.pipeline
  level: INFO
  directory: logs
  file_name: pipeline.log
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  console: true
